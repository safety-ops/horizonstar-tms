<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CD Load Importer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
    }

    /* === HEADER === */
    .header {
      background: linear-gradient(145deg, #0f1b2d 0%, #0a0f1a 100%);
      padding: 20px 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      border-radius: 2px;
    }
    .header .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .header .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .header .subtitle {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* === CONTENT === */
    .content { padding: 16px 20px 20px; }

    /* === STATUS CARD === */
    .status-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .status-icon.connected {
      background: rgba(34, 197, 94, 0.15);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
      animation: pulse-green 2s ease-in-out infinite;
    }
    .status-icon.disconnected {
      background: rgba(239, 68, 68, 0.15);
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 12px rgba(34, 197, 94, 0.2); }
      50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
    }
    .status-text h3 {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .status-text p {
      font-size: 11px;
      color: #64748b;
    }

    /* === FORM === */
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      color: #e2e8f0;
      font-size: 13px;
      transition: all 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }
    .form-group select option {
      background: #0f172a;
      color: #e2e8f0;
    }
    .form-group input::placeholder {
      color: #475569;
    }

    /* === BUTTONS === */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.25);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.2);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn:active { transform: translateY(0); }

    /* === DIVIDER === */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 16px 0;
    }

    /* === INFO BOX === */
    .info-box {
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.12);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .info-box h4 {
      font-size: 11px;
      font-weight: 700;
      color: #22c55e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-box p {
      font-size: 11px;
      color: #64748b;
      line-height: 1.6;
    }
    .info-box .step {
      color: #22c55e;
      font-weight: 700;
      margin-right: 2px;
    }

    /* === RECENT IMPORTS === */
    .recent-section {
      margin-top: 16px;
      display: none;
    }
    .recent-header {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .recent-header .count {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .recent-list { display: grid; gap: 6px; }
    .recent-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 8px 10px;
      transition: border-color 0.2s;
    }
    .recent-item:hover {
      border-color: rgba(34, 197, 94, 0.15);
    }
    .recent-item .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .recent-item .order-num {
      font-weight: 600;
      font-size: 12px;
      color: #e2e8f0;
    }
    .recent-item .revenue {
      color: #22c55e;
      font-weight: 700;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .recent-item .route {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .recent-item .meta {
      font-size: 10px;
      color: #475569;
      margin-top: 2px;
    }

    /* === FOOTER === */
    .footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      text-align: center;
    }
    .footer a {
      color: #475569;
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .footer a:hover { color: #22c55e; }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    .toast.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-icon">&#x1F69B;</div>
      <h1>HORIZON STAR TMS</h1>
    </div>
    <p class="subtitle">CD Load Importer v1.1</p>
  </div>

  <div class="content">
    <div class="status-card" id="statusCard">
      <div class="status-icon disconnected" id="statusIcon">&#x2753;</div>
      <div class="status-text">
        <h3 id="statusTitle">Not Connected</h3>
        <p id="statusMessage">Configure API key below</p>
      </div>
    </div>

    <div class="form-group">
      <label for="supabaseUrl">Supabase URL</label>
      <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co" />
    </div>

    <div class="form-group">
      <label for="supabaseKey">API Key</label>
      <input type="password" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI..." />
    </div>

    <div class="form-group">
      <label for="dispatcherId">Dispatcher</label>
      <select id="dispatcherId" style="width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:rgba(255,255,255,0.03);color:#e2e8f0;font-size:13px;appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2364748b%22 stroke-width=%222%22><polyline points=%226 9 12 15 18 9%22/></svg>');background-repeat:no-repeat;background-position:right 12px center;cursor:pointer;">
        <option value="">Loading dispatchers...</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">&#x1F4BE; Save</button>
      <button class="btn btn-secondary" id="testBtn">&#x1F517; Test</button>
    </div>

    <div class="info-box">
      <h4>How to use</h4>
      <p>
        <span class="step">1.</span> Enter your credentials above<br>
        <span class="step">2.</span> Go to Central Dispatch<br>
        <span class="step">3.</span> Open a dispatched load<br>
        <span class="step">4.</span> Click the green "Import to TMS" button
      </p>
    </div>

    <div class="recent-section" id="recentImportsSection">
      <div class="divider"></div>
      <div class="recent-header">
        Recent Imports <span class="count" id="recentCount"></span>
      </div>
      <div class="recent-list" id="recentImportsList"></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/safety-ops/horizonstar-tms" target="_blank">HORIZON STAR LLC</a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
